<app-navbar></app-navbar>

<div class="container mt-4">

  <div *ngIf="message" class="alert alert-success">
    {{ message }}
  </div>

  <div *ngIf="errorMessage" class="alert alert-danger">
    {{ errorMessage }}
  </div>

  <div class="card p-4 shadow mb-4">
    <h4>Enroll Student</h4>

    <div class="row">

      <div class="col-md-5 mb-3">
        <select class="form-select" [(ngModel)]="student_id">
          <option [ngValue]="null">Select Student</option>
          <option *ngFor="let student of students" [ngValue]="student.id">
            {{ student.name }} - {{ student.email }}
          </option>
        </select>
      </div>

      <div class="col-md-5 mb-3">
        <select class="form-select" [(ngModel)]="program_id">
          <option [ngValue]="null">Select Program</option>
          <option *ngFor="let program of programs" [ngValue]="program.id">
            Program {{ program.id }} - {{ program.course }} - {{ program.location }}
          </option>
        </select>
      </div>

      <div class="col-md-2 mb-3">
        <button class="btn btn-primary w-100" (click)="enrollStudent()">
          Enroll
        </button>
      </div>

    </div>
  </div>

  <div class="card p-4 shadow">
    <h4>Enrollment List</h4>

    <table class="table table-bordered table-striped mt-3">
      <thead>
        <tr>
          <th>Enrollment ID</th>
          <th>Student</th>
          <th>Program ID</th>
          <th>Course</th>
          <th>Actions</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let enrollment of enrollments">
          <td>{{ enrollment.id }}</td>
          <td>{{ enrollment.student }}</td>
          <td>{{ enrollment.program_id }}</td>
          <td>{{ enrollment.course }}</td>
          <td>
            <button
              class="btn btn-sm btn-danger"
              (click)="deleteEnrollment(enrollment.id)">
              Delete
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

</div>
